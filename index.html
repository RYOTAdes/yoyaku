<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ご予約空き状況</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4ff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;color:#1a1a1a}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
input:focus,textarea:focus{outline:none;border-color:#4a7fd4!important;box-shadow:0 0 0 3px rgba(74,127,212,0.15)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeUp 0.25s ease}
</style>
</head>
<body>
<div id="app"></div>
<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbwm8JZJbOeKRpFte3h6Mkr3P-Q7TAIyVzvNuaXsqySaZ7h8UJTN-36trhrXrrKUSHzHUA/exec";
const HOURS=[9,10,11,12,13,14,15,16,17];
const WEEKDAY=["日","月","火","水","木","金","土"];
const AC_OPTIONS=["エアコン（壁掛け型）","エアコン（お掃除機能付き）","エアコン（天井カセット型）"];
const MENU=["エアコン（壁掛け型）","エアコン（お掃除機能付き）","エアコン（天井カセット型）","縦型洗濯機","ドラム式洗濯機","浴室・バスルーム","キッチン","レンジフード","トイレ","洗面台","窓ガラス・サッシ","その他（備考に記載）"];
const PRICES=[
  {cat:"エアコン",items:[
    {name:"エアコン（壁掛け型）",price:"¥8,000〜",opts:[{l:"防カビコート",p:"+¥1,000"},{l:"室外機",p:"+¥3,000"}]},
    {name:"エアコン（お掃除機能付き）",price:"¥14,000〜",opts:[{l:"防カビコート",p:"+¥1,000"},{l:"室外機",p:"+¥3,000"}]},
    {name:"エアコン（天井カセット型）",price:"お問い合わせ",opts:[]},
  ]},
  {cat:"洗濯機",items:[
    {name:"縦型洗濯機",price:"¥14,000〜",opts:[{l:"乾燥付き",p:"+¥3,000"},{l:"日立BW（乾燥無し）",p:"+¥2,000"},{l:"日立BW（乾燥付き）",p:"+¥4,000"},{l:"日立BW DXシリーズ",p:"+¥10,000"}]},
    {name:"ドラム式洗濯機",price:"¥25,000〜",caution:"⚠️ 対象外：AQUA・IRIS OYAMA・2010年製以前",opts:[{l:"東芝・シャープ製",p:"+¥2,000"}]},
  ]},
  {cat:"水回り",items:[
    {name:"浴室・バスルーム",price:"¥14,000",note:"鏡/浴槽/天井/照明/窓/蛇口/シャワー/壁面/床/扉/排水口",opts:[]},
    {name:"キッチン",price:"¥12,000",note:"シンク/ガスコンロ/戸棚表面/蛇口/壁面/グリル/排水口",opts:[]},
    {name:"レンジフード",price:"¥12,000",note:"カバー/本体内部/ファン/フィルター ※キッチンの壁は含まれません",opts:[]},
    {name:"トイレ＋洗面台",price:"¥13,000",note:"2点セット価格",opts:[]},
    {name:"窓ガラス・サッシ",price:"お問い合わせ",opts:[]},
  ]},
  {cat:"セットメニュー（お得！）",items:[
    {name:"レンジフード＋キッチン＋浴室",price:"¥34,000",note:"セットなら通常より大幅お得！",opts:[]},
    {name:"水回り5点セット",price:"¥42,000",note:"浴室・キッチン・レンジフード・トイレ・洗面台",opts:[{l:"トイレ追加",p:"+¥5,000"}]},
  ]},
  {cat:"その他",items:[
    {name:"店舗清掃",price:"お問い合わせ",opts:[]},
    {name:"フロアクリーニング",price:"お問い合わせ",opts:[]},
    {name:"排水管洗浄",price:"お問い合わせ",note:"戸建てに限る",opts:[]},
  ]},
];

// ── 状態管理 ──────────────────────────────────
let state={
  step:"cal", // cal|form|confirm|done
  yr:new Date().getFullYear(), mo:new Date().getMonth()+1,
  resv:{}, loading:true,
  selDate:null, slots:[], // [{date,hour,label}]
  form:{name:"",kana:"",address:"",phone:"",menu:[],count:{},note:""},
  errors:{}, sending:false,
  showPrice:false, showAdmin:false,
  adminUnlocked:false, adminPass:"",
  blockDate:"", blockHours:[], blockMemo:"", blockMsg:"",
  adminTab:"block", // block | price
  editPrices:JSON.parse(JSON.stringify(PRICES)), editPriceMsg:"",
};
const today=new Date();

function setState(patch){state={...state,...patch};render();}

// ── GAS通信 ──────────────────────────────────
async function loadData(){
  setState({loading:true});
  try{
    const r=await fetch(GAS_URL+"?t="+Date.now()); // キャッシュ無効化
    const j=await r.json();
    if(j.ok) setState({resv:j.data||{},loading:false});
    else setState({loading:false});
  }catch(e){console.warn(e);setState({loading:false});}
}

async function submitReservation(){
  setState({sending:true});
  try{
    await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({
      name:state.form.name,kana:state.form.kana,address:state.form.address,phone:state.form.phone,
      slots:state.slots.map((s,i)=>`第${"一二三"[i]}希望：${s.label}`),
      confirmedSlot:state.form.confirmedSlot!=null?state.slots[state.form.confirmedSlot]?.label:"未確定",
      cleaning:state.form.menu.map(x=>AC_OPTIONS.includes(x)?`${x}×${state.form.count[x]||1}台`:x),
      cleaningNote:state.form.note,
    })});
  }catch(e){console.warn(e);}
  setState({sending:false,step:"done"});
}

async function submitBlock(){
  const dates=state.blockDate.split(",").filter(Boolean);
  if(!dates.length||!state.blockHours.length){setState({blockMsg:"日付と時間を選んでください"});return;}
  setState({blockMsg:"送信中..."});
  try{
    for(const d of dates){
      await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({
        type:"block",date:d,hours:state.blockHours,memo:state.blockMemo
      })});
    }
    const newResv={...state.resv};
    for(const d of dates){
      if(!newResv[d])newResv[d]={};
      for(const h of state.blockHours) newResv[d][String(h)]={status:"confirmed",name:"ブロック"};
    }
    setState({resv:newResv,blockMsg:`✅ ${dates.length}日×${state.blockHours.length}時間帯をブロックしました！`,blockDate:"",blockHours:[],blockMemo:""});
  }catch(e){setState({blockMsg:"⚠️ 送信しました"});}
}

// ── ユーティリティ ─────────────────────────────
function dkey(y,m,d){return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
function isPast(d){return new Date(state.yr,state.mo-1,d)<new Date(today.getFullYear(),today.getMonth(),today.getDate());}
function isToday(d){return state.yr===today.getFullYear()&&state.mo===today.getMonth()+1&&d===today.getDate();}
function slotSt(d,h){const day=state.resv[dkey(state.yr,state.mo,d)]||{};return (day[h]||day[String(h)]||{}).status||"available";}
function availCnt(d){return HOURS.filter(h=>slotSt(d,h)==="available").length;}
function isSlotSel(d,h){return state.slots.some(s=>s.date===dkey(state.yr,state.mo,d)&&s.hour===h);}
function selCntDay(d){return state.slots.filter(s=>s.date===dkey(state.yr,state.mo,d)).length;}

function toggleSlot(d,h){
  const k=dkey(state.yr,state.mo,d);
  const dow=new Date(state.yr,state.mo-1,d).getDay();
  const label=`${state.mo}月${d}日（${WEEKDAY[dow]}）${String(h).padStart(2,"0")}:00〜${String(h+1).padStart(2,"0")}:00`;
  const exists=state.slots.some(s=>s.date===k&&s.hour===h);
  if(exists) setState({slots:state.slots.filter(s=>!(s.date===k&&s.hour===h))});
  else if(state.slots.length<3) setState({slots:[...state.slots,{date:k,hour:h,label}]});
}

function toggleMenu(item){
  const m=state.form.menu.includes(item)?state.form.menu.filter(x=>x!==item):[...state.form.menu,item];
  setState({form:{...state.form,menu:m}});
}

function validate(){
  const e={};
  // inputのchangeイベントで直接state.formを更新しているので最新値を読む
  if(!(state.form.name||"").trim())e.name="お名前を入力してください";
  if(!(state.form.kana||"").trim())e.kana="ふりがなを入力してください";
  if(!(state.form.address||"").trim())e.address="ご住所を入力してください";
  if(!(state.form.phone||"").trim())e.phone="お電話番号を入力してください";
  if(!state.slots.length)e.slots="希望日時を1つ以上選んでください";
  if(!state.form.menu.length)e.menu="クリーニング内容を選んでください";
  setState({errors:e});
  return !Object.keys(e).length;
}

function reset(){setState({step:"cal",selDate:null,slots:[],form:{name:"",kana:"",address:"",phone:"",menu:[],count:{},note:""},errors:{}});}

// ── HTML生成ヘルパー ──────────────────────────
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") el.className=v;
    else el.setAttribute(k,v);
  });
  if(children) [].concat(children).forEach(c=>{
    if(c==null||c===false) return;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return el;
}
function div(s,c){return h("div",{style:s},c);}
function btn(s,onClick,c){return h("button",{style:s,onClick},c);}
function inp(s,val,onInput,type="text",placeholder=""){
  const el=h("input",{style:s,type,placeholder});
  el.value=val||"";
  // changeイベントでrerenderしないで直接stateを更新
  el.addEventListener("change",e=>onInput(e.target.value));
  return el;
}
function ta(s,val,onInput,rows,placeholder){
  const el=h("textarea",{style:s,rows,placeholder});
  el.value=val||"";
  el.addEventListener("change",e=>onInput(e.target.value));
  return el;
}

// ── カラー定数 ─────────────────────────────────
const C={
  bg:"#f0f4ff",card:"#fff",border:"#d0d9f0",
  accent:"#1a4fa0",accentL:"#e8eeff",accentM:"#4a7fd4",
  warn:"#e07a2f",danger:"#c0392b",
  text:"#1a1a1a",mid:"#555",muted:"#999",
  sat:"#2563eb",sun:"#dc2626",
};

// ── レンダリング ──────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(buildApp());
}

function buildApp(){
  const wrap=div({minHeight:"100vh",background:C.bg,color:C.text});
  wrap.appendChild(buildHeader());
  if(state.showPrice) wrap.appendChild(buildPriceModal());
  if(state.showAdmin) wrap.appendChild(buildAdminModal());
  const main=h("main",{style:{maxWidth:"480px",margin:"0 auto",padding:"0 0 100px"}});
  if(state.step==="cal") main.appendChild(buildCal());
  else if(state.step==="form") main.appendChild(buildForm());
  else if(state.step==="confirm") main.appendChild(buildConfirm());
  else if(state.step==="done") main.appendChild(buildDone());
  wrap.appendChild(main);
  if(state.step==="cal"){
    const fab=div({position:"fixed",bottom:"0",left:"0",right:"0",zIndex:"10",
      display:"flex",justifyContent:"center",padding:"12px 16px 28px",
      background:"linear-gradient(transparent,rgba(240,244,255,0.97) 40%)"});
    fab.appendChild(btn({background:C.accent,border:"none",color:"#fff",borderRadius:"14px",
      padding:"14px 48px",fontSize:"15px",fontWeight:"700",
      boxShadow:"0 4px 20px rgba(26,79,160,0.35)",letterSpacing:"0.05em"},
      ()=>setState({showPrice:true}),"💰 料金表を見る"));
    wrap.appendChild(fab);
  }
  return wrap;
}

function buildHeader(){
  const hdr=h("header",{style:{background:C.accent,color:"#fff",padding:"18px 16px 14px",
    textAlign:"center",position:"sticky",top:"0",zIndex:"20",
    boxShadow:"0 2px 12px rgba(26,79,160,0.3)"}});
  if(state.step!=="cal"){
    const back=btn({position:"absolute",left:"12px",top:"50%",transform:"translateY(-50%)",
      background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",
      borderRadius:"8px",padding:"6px 12px",fontSize:"13px"},
      ()=>{if(state.step==="form")setState({step:"cal"});else if(state.step==="confirm")setState({step:"form"});else reset();},"← 戻る");
    hdr.appendChild(back);
  }
  hdr.appendChild(div({fontSize:"13px",fontWeight:"700",letterSpacing:"0.08em",marginBottom:"3px"},"ココピカクリーンサービス"));
  hdr.appendChild(div({fontSize:"10px",opacity:"0.7",letterSpacing:"0.1em",marginBottom:"3px"},"年中無休 ／ 9:00〜18:00"));
  hdr.appendChild(div({fontSize:"18px",fontWeight:"700"},"ご予約空き状況"));
  if(state.step==="cal"&&state.slots.length>0){
    const nb=btn({position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",
      background:C.accentM,border:"none",color:"#fff",borderRadius:"8px",
      padding:"6px 12px",fontSize:"12px",fontWeight:"700"},
      ()=>setState({step:"form"}),`次へ (${state.slots.length})`);
    hdr.appendChild(nb);
  } else if(state.step==="cal"){
    const gb=btn({position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",
      background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",
      borderRadius:"8px",padding:"6px 10px",fontSize:"18px"},
      ()=>setState({showAdmin:true}),"⚙️");
    hdr.appendChild(gb);
  }
  return hdr;
}

function buildCal(){
  const wrap=div({});
  // 月ナビ
  const nav=div({display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 10px"});
  nav.appendChild(btn({background:"none",border:`1.5px solid ${C.border}`,borderRadius:"10px",width:"36px",height:"36px",fontSize:"19px",color:C.mid},
    ()=>{if(state.mo===1)setState({yr:state.yr-1,mo:12,selDate:null});else setState({mo:state.mo-1,selDate:null});},"‹"));
  nav.appendChild(div({fontSize:"17px",fontWeight:"700"},`${state.yr}年 ${state.mo}月`));
  nav.appendChild(btn({background:"none",border:`1.5px solid ${C.border}`,borderRadius:"10px",width:"36px",height:"36px",fontSize:"19px",color:C.mid},
    ()=>{if(state.mo===12)setState({yr:state.yr+1,mo:1,selDate:null});else setState({mo:state.mo+1,selDate:null});},"›"));
  wrap.appendChild(nav);
  // 凡例
  const leg=div({display:"flex",gap:"12px",padding:"0 20px 12px",flexWrap:"wrap"});
  [{c:C.accentM,l:"空きあり"},{c:C.warn,l:"残りわずか"},{c:"#e0e0e0",l:"満員"}].forEach(({c,l})=>{
    const item=div({display:"flex",alignItems:"center",gap:"4px",fontSize:"11px",color:C.muted});
    item.appendChild(div({width:"9px",height:"9px",borderRadius:"2px",background:c,display:"inline-block"},""));
    item.appendChild(document.createTextNode(l));
    leg.appendChild(item);
  });
  wrap.appendChild(leg);

  if(state.loading){
    wrap.appendChild(div({textAlign:"center",padding:"40px",color:C.muted,fontSize:"14px"},"読み込み中..."));
    return wrap;
  }

  // カレンダーグリッド
  const days=new Date(state.yr,state.mo,0).getDate();
  const firstDay=new Date(state.yr,state.mo-1,1).getDay();
  const grid=div({background:C.card,margin:"0 12px",borderRadius:"14px",
    border:`1px solid ${C.border}`,overflow:"hidden",boxShadow:"0 2px 16px rgba(0,0,0,0.06)"});
  const wrow=div({display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:`1px solid ${C.border}`});
  WEEKDAY.forEach((w,i)=>{
    wrow.appendChild(div({textAlign:"center",padding:"9px 0",fontSize:"11px",fontWeight:"700",
      color:i===0?C.sun:i===6?C.sat:C.muted},w));
  });
  grid.appendChild(wrow);
  const drow=div({display:"grid",gridTemplateColumns:"repeat(7,1fr)"});
  for(let i=0;i<firstDay;i++){
    drow.appendChild(div({minHeight:"54px",borderRight:(i+1)%7!==0?`1px solid ${C.border}`:"none",borderBottom:`1px solid ${C.border}`},""));
  }
  for(let d=1;d<=days;d++){
    const idx=firstDay+d-1;
    const past=isPast(d),avail=past?0:availCnt(d);
    const dow=(firstDay+d-1)%7;
    const sc=selCntDay(d);
    const ac=avail===0?"#e0e0e0":avail<=2?C.warn:C.accentM;
    const active=state.selDate===d;
    const cell=div({minHeight:"54px",padding:"7px 4px 5px",
      borderRight:(idx+1)%7!==0?`1px solid ${C.border}`:"none",
      borderBottom:`1px solid ${C.border}`,
      cursor:past||avail===0?"default":"pointer",
      background:active?C.accentL:"transparent",
      outline:active?`2px solid ${C.accent}`:"2px solid transparent",
      outlineOffset:"-2px",position:"relative",transition:"background 0.1s"});
    if(!past&&avail>0) cell.addEventListener("click",()=>setState({selDate:active?null:d}));
    cell.appendChild(div({textAlign:"center",fontSize:"13px",fontWeight:isToday(d)?"700":"400",
      color:past?"#ccc":dow===0?C.sun:dow===6?C.sat:isToday(d)?C.accent:C.text,marginBottom:"3px"},String(d)));
    if(!past){
      cell.appendChild(div({height:"3px",borderRadius:"2px",margin:"0 5px",background:ac,opacity:avail===0?"0.35":"1"},""));
      if(avail>0) cell.appendChild(div({textAlign:"center",fontSize:"9px",color:ac,marginTop:"2px"},`${avail}枠`));
      else cell.appendChild(div({textAlign:"center",fontSize:"9px",color:C.muted,marginTop:"2px"},"満員"));
    }
    if(sc>0){
      const badge=div({position:"absolute",top:"3px",right:"3px",width:"14px",height:"14px",
        borderRadius:"50%",background:C.accent,color:"#fff",fontSize:"9px",fontWeight:"700",
        display:"flex",alignItems:"center",justifyContent:"center"},String(sc));
      cell.appendChild(badge);
    }
    drow.appendChild(cell);
  }
  grid.appendChild(drow);
  wrap.appendChild(grid);

  // 時間帯スロット
  if(state.selDate){
    const d=state.selDate;
    const dow=new Date(state.yr,state.mo-1,d).getDay();
    const sbox=div({margin:"14px 12px 0",background:C.card,borderRadius:"14px",
      border:`1px solid ${C.border}`,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.05)"});
    const shead=div({padding:"12px 16px 10px",borderBottom:`1px solid ${C.border}`,
      display:"flex",alignItems:"center",justifyContent:"space-between"});
    shead.appendChild(div({fontSize:"15px",fontWeight:"700"},`${state.mo}月${d}日（${WEEKDAY[dow]}）`));
    shead.appendChild(div({fontSize:"11px",color:state.slots.length>=3?C.warn:C.muted},
      state.slots.length>=3?"3つ選択済み（上限）":`あと${3-state.slots.length}つ選べます`));
    sbox.appendChild(shead);
    const sgrid=div({display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",padding:"12px"});
    HOURS.forEach(h=>{
      const st=slotSt(d,h),avail=st==="available",pend=st==="pending",sel=isSlotSel(d,h);
      const sb=btn({borderRadius:"10px",padding:"11px 6px",
        background:sel?C.accent:avail?C.card:pend?"#fffbeb":"#f0f0f0",
        border:`1.5px solid ${sel?C.accent:avail?C.accentM:pend?"#f59e0b":C.border}`,
        color:sel?"#fff":avail?C.accent:pend?C.warn:C.muted,
        cursor:avail?"pointer":"not-allowed",transition:"all 0.15s",fontWeight:"600",
        display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"},
        ()=>{if(avail)toggleSlot(d,h);},
        [div({fontSize:"15px"},`${String(h).padStart(2,"0")}:00`),
         div({fontSize:"10px",opacity:"0.8"},sel?"✓ 選択中":avail?"":pend?"仮予約中":"予約済")]);
      sgrid.appendChild(sb);
    });
    sbox.appendChild(sgrid);
    wrap.appendChild(sbox);
  }

  // 選択済みリスト
  if(state.slots.length>0){
    const slist=div({margin:"14px 12px 0",background:C.accentL,borderRadius:"12px",
      padding:"12px 14px",border:`1px solid ${C.accentM}`});
    slist.appendChild(div({fontSize:"12px",fontWeight:"700",color:C.accent,marginBottom:"8px"},
      `選択中の希望日時（${state.slots.length}/3）`));
    state.slots.forEach((s,i)=>{
      const row=div({display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"5px 0",borderBottom:i<state.slots.length-1?`1px solid rgba(74,127,212,0.2)`:"none"});
      row.appendChild(div({fontSize:"13px",color:C.accent},`第${"一二三"[i]}希望：${s.label}`));
      row.appendChild(btn({background:"none",border:"none",color:C.muted,fontSize:"16px",padding:"0 4px"},
        ()=>setState({slots:state.slots.filter((_,j)=>j!==i)}),"×"));
      slist.appendChild(row);
    });
    slist.appendChild(btn({width:"100%",marginTop:"12px",padding:"13px",borderRadius:"10px",border:"none",
      background:C.accent,color:"#fff",fontSize:"14px",fontWeight:"700",
      boxShadow:"0 3px 12px rgba(26,79,160,0.3)"},()=>setState({step:"form"}),"お客様情報を入力する →"));
    wrap.appendChild(slist);
  }
  return wrap;
}

function buildForm(){
  const wrap=div({padding:"18px 14px 0"});
  // 選択日時サマリ
  const summary=div({background:C.accentL,borderRadius:"12px",padding:"12px 14px",marginBottom:"18px",border:`1px solid ${C.accentM}`});

        modal.appendChild(catRow);
        cat.items.forEach((item,ii)=>{
          const card=div({background:"#f8f9ff",borderRadius:"10px",padding:"12px",marginBottom:"8px",
            border:`1px solid ${C.border}`});
          // 項目名編集
          const nameInp=h("input",{type:"text",style:{width:"100%",padding:"8px 10px",borderRadius:"8px",
            border:`1.5px solid ${C.border}`,fontSize:"13px",fontWeight:"700",color:C.text,marginBottom:"6px"}});
          nameInp.value=item.name;
          nameInp.addEventListener("input",e=>{ep[ci].items[ii].name=e.target.value;});
          card.appendChild(nameInp);
          // 料金入力
          const prow=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"});
          prow.appendChild(div({fontSize:"11px",color:C.muted,width:"32px"},"料金"));
          const pi2=h("input",{type:"text",
            style:{flex:"1",padding:"8px 10px",borderRadius:"8px",border:`1.5px solid ${C.border}`,fontSize:"14px",fontWeight:"700",color:C.warn}});
          pi2.value=item.price;
          pi2.addEventListener("input",e=>{ep[ci].items[ii].price=e.target.value;});
          prow.appendChild(pi2);
          card.appendChild(prow);
          // 備考入力
          const nrow=div({display:"flex",alignItems:"flex-start",gap:"8px",marginBottom:"6px"});
          nrow.appendChild(div({fontSize:"11px",color:C.muted,width:"32px",paddingTop:"8px"},"備考"));
          const nta=h("textarea",{style:{flex:"1",padding:"8px 10px",borderRadius:"8px",
            border:`1.5px solid ${C.border}`,fontSize:"12px",resize:"none",lineHeight:"1.6"},rows:"2",
            placeholder:"清掃範囲や注意事項など（任意）"});
          nta.value=item.note||"";
          nta.addEventListener("input",e=>{ep[ci].items[ii].note=e.target.value;});
          nrow.appendChild(nta);
          card.appendChild(nrow);
          // オプション編集
          const optLabel=div({fontSize:"11px",color:C.muted,fontWeight:"700",marginBottom:"4px"},"オプション");
          card.appendChild(optLabel);
          const optList=div({id:`opts-${ci}-${ii}`});
          function renderOpts(){
            optList.innerHTML="";
            ep[ci].items[ii].opts.forEach((op,oi)=>{
              const orow=div({display:"flex",alignItems:"center",gap:"6px",marginBottom:"4px"});
              const ol=h("input",{type:"text",style:{flex:"1",padding:"6px 8px",borderRadius:"6px",
                border:`1px solid ${C.border}`,fontSize:"11px",color:C.accent},placeholder:"オプション名"});
              ol.value=op.l;
              ol.addEventListener("input",e=>{ep[ci].items[ii].opts[oi].l=e.target.value;});
              const op2=h("input",{type:"text",style:{width:"70px",padding:"6px 8px",borderRadius:"6px",
                border:`1px solid ${C.border}`,fontSize:"11px",color:C.warn,textAlign:"right"},placeholder:"+¥0"});
              op2.value=op.p;
              op2.addEventListener("input",e=>{ep[ci].items[ii].opts[oi].p=e.target.value;});
              const delBtn=btn({background:"none",border:`1px solid #ffaaaa`,borderRadius:"6px",
                color:"#c0392b",fontSize:"12px",padding:"4px 8px",whiteSpace:"nowrap"},
                ()=>{ep[ci].items[ii].opts.splice(oi,1);renderOpts();},"✕");
              orow.appendChild(ol);
              orow.appendChild(op2);
              orow.appendChild(delBtn);
              optList.appendChild(orow);
            });
          }
          renderOpts();
          card.appendChild(optList);
          // オプション追加ボタン
          card.appendChild(btn({width:"100%",padding:"6px",borderRadius:"8px",
            border:`1.5px dashed ${C.accentM}`,background:"#f0f4ff",
            color:C.accent,fontSize:"12px",fontWeight:"700",marginTop:"4px"},
            ()=>{ep[ci].items[ii].opts.push({l:"",p:""});renderOpts();},"＋ オプションを追加"));
          // 並び替え＋削除ボタン
          const ctrlRow=div({display:"flex",gap:"6px",marginTop:"6px"});
          if(ii>0) ctrlRow.appendChild(btn({flex:"1",padding:"6px",borderRadius:"8px",
            border:`1px solid ${C.border}`,background:"#f0f4ff",color:C.accent,fontSize:"13px"},
            ()=>{const tmp=ep[ci].items[ii];ep[ci].items[ii]=ep[ci].items[ii-1];ep[ci].items[ii-1]=tmp;setState({editPrices:JSON.parse(JSON.stringify(ep))});},"↑ 上へ"));
          if(ii<ep[ci].items.length-1) ctrlRow.appendChild(btn({flex:"1",padding:"6px",borderRadius:"8px",
            border:`1px solid ${C.border}`,background:"#f0f4ff",color:C.accent,fontSize:"13px"},
            ()=>{const tmp=ep[ci].items[ii];ep[ci].items[ii]=ep[ci].items[ii+1];ep[ci].items[ii+1]=tmp;setState({editPrices:JSON.parse(JSON.stringify(ep))});},"↓ 下へ"));
          ctrlRow.appendChild(btn({flex:"1",padding:"6px",borderRadius:"8px",
            border:"1.5px dashed #ffaaaa",background:"#fff8f8",
            color:"#c0392b",fontSize:"12px",fontWeight:"700"},
            ()=>{ep[ci].items.splice(ii,1);setState({editPrices:JSON.parse(JSON.stringify(ep))});},"✕ 削除"));
          card.appendChild(ctrlRow);
          modal.appendChild(card);
        });
        // 項目追加ボタン
        modal.appendChild(btn({width:"100%",padding:"8px",borderRadius:"10px",
          border:`1.5px dashed ${C.accentM}`,background:"#f0f4ff",
          color:C.accent,fontSize:"13px",fontWeight:"700",marginBottom:"12px"},
          ()=>{ep[ci].items.push({name:"新しい項目",price:"¥0",note:"",opts:[]});setState({editPrices:ep});},"＋ 項目を追加"));
      });
      // カテゴリ追加ボタン
      modal.appendChild(btn({width:"100%",padding:"10px",borderRadius:"10px",
        border:`2px dashed ${C.accentM}`,background:"#e8eeff",
        color:C.accent,fontSize:"13px",fontWeight:"700",marginBottom:"14px"},
        ()=>{ep.push({cat:"新しいカテゴリ",items:[]});setState({editPrices:JSON.parse(JSON.stringify(ep))});},"＋ カテゴリを追加"));
      if(state.editPriceMsg) modal.appendChild(div({fontSize:"13px",color:C.accent,marginBottom:"10px"},state.editPriceMsg));
      modal.appendChild(btn({width:"100%",padding:"13px",borderRadius:"12px",border:"none",
        background:C.accent,color:"#fff",fontSize:"14px",fontWeight:"700",marginBottom:"10px"},
        ()=>{
          // PRICESを更新してlocalStorageに保存
          ep.forEach((cat,ci)=>{
            cat.items.forEach((item,ii)=>{
              PRICES[ci].items[ii].price=item.price;
              if(item.opts) item.opts.forEach((op,oi)=>{
                PRICES[ci].items[ii].opts[oi].l=op.l;
                PRICES[ci].items[ii].opts[oi].p=op.p;
              });
            });
          });
          try{localStorage.setItem("cocopi_prices",JSON.stringify(PRICES));}catch(e){}
          setState({editPriceMsg:"✅ 保存しました！"});
          setTimeout(()=>setState({editPriceMsg:""}),2000);
        },"💾 保存する"));
      modal.appendChild(btn({width:"100%",padding:"13px",borderRadius:"12px",
        border:`1.5px solid ${C.border}`,background:"#fff",color:C.mid,fontSize:"14px"},
        ()=>setState({showAdmin:false,adminUnlocked:false,adminPass:"",blockMsg:""}),"閉じる"));
    } // end price tab
  }
  overlay.appendChild(modal);
  return overlay;
}

// ── 起動 ─────────────────────────────────────
// 保存済み料金を復元
try{
  const saved=localStorage.getItem("cocopi_prices");
  if(saved){
    const savedPrices=JSON.parse(saved);
    savedPrices.forEach((cat,ci)=>{
      if(PRICES[ci]) cat.items.forEach((item,ii)=>{
        if(PRICES[ci].items[ii]){
          PRICES[ci].items[ii].price=item.price;
          if(item.opts) item.opts.forEach((op,oi)=>{
            if(PRICES[ci].items[ii].opts[oi]){
              PRICES[ci].items[ii].opts[oi].l=op.l;
              PRICES[ci].items[ii].opts[oi].p=op.p;
            }
          });
        }
      });
    });
  }
}catch(e){}
state.editPrices=JSON.parse(JSON.stringify(PRICES));
loadData();
render();
</script>
</body>
</html>
